        <div id ="startPage" class="pageOverlay">

        <div id="gameOverPage" class="pageOverlay" style="display:none;">
            <h1 id="pageHeaderTwo">GAME OVER</h1>

        <div id="pausePage" class="pageOvegit rlay" style="display: none;">
